# Note: This YAML is for reference only.
# Use the CLI command above to deploy the endpoint.
# nebius ai endpoint create does not support --file flag.

name: medisimplifier-vllm
description: "MediSimplifier vLLM inference endpoint — OpenAI-compatible /v1/completions"
public: true
parent_id: ${NEBIUS_PROJECT_ID}

docker:
  image: vllm/vllm-openai:latest
  command: python
  args:
    - "-m"
    - "vllm.entrypoints.openai.api_server"
    - "--model"
    - "/mnt/adapters/merged_openbio"
    - "--port"
    - "8000"
    - "--dtype"
    - "float16"
    - "--max-model-len"
    - "4096"

env:
  HF_HOME: "/tmp/hf_cache"
  PYTHONUNBUFFERED: "1"

ports:
  - 8000

volumes:
  - bucket: medisimplifier-adapters
    mount: /mnt/adapters
    mode: ro

resources:
  platform: gpu-h100-sxm
  preset: 1gpu-16vcpu-200gb
  disk_size: 250Gi
  subnet_id: ${NEBIUS_SUBNET_ID}

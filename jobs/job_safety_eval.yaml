name: medisimplifier-safety-eval
description: "Medical safety evaluation v2 — dual judge (Llama-3.3-70B + Qwen2.5-72B), Cohen kappa, ROUGE-faithfulness correlation, n=1001"

docker:
  image: chambul/medisimplifier:train-v18
  command: python
  args:
    - "safety_eval_v2.py"
    - "--adapter-path"
    - "/mnt/adapters/full_training"
    - "--n-samples"
    - "1001"
    - "--output-file"
    - "/mnt/adapters/safety_results_v2.json"
    - "--seed"
    - "42"

env:
  HF_HOME: "/tmp/hf_cache"
  PYTHONUNBUFFERED: "1"
  NEBIUS_API_KEY: "${NEBIUS_API_KEY}"

volumes:
  - bucket: medisimplifier-adapters
    mount: /mnt/adapters
    mode: rw

resources:
  platform: gpu-h100-sxm
  preset: 1gpu-16vcpu-200gb
  disk_size: 250Gi

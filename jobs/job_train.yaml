name: medisimplifier-full-training
description: "LoRA fine-tuning — OpenBioLLM-8B, r=32, all_attn, 3 epochs"
parent_id: ${NEBIUS_PROJECT_ID}

resources:
  platform: gpu-h100-sxm
  preset: 1gpu-16vcpu-200gb
  disk_size: 250Gi
  subnet_id: ${NEBIUS_SUBNET_ID}

docker:
  image: chambul/medisimplifier:train-v26
  command: python
  args:
    - "train.py"
    - "--model"
    - "openbio"
    - "--epochs"
    - "3"
    - "--rank"
    - "32"
    - "--modules"
    - "all_attn"
    - "--seed"
    - "42"

env:
  HF_TOKEN: "${HF_TOKEN}"
  HF_HOME: "/tmp/hf_cache"
  PYTHONUNBUFFERED: "1"

volumes:
  - bucket: medisimplifier-adapters
    mount: /output
    mode: rw

timeout: 5h
